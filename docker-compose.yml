services:
  # Infrastructure services (start first)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_network
    profiles:
      - necessary

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_network
    environment:
      - OLLAMA_CONTEXT_LENGTH=2048
      - OLLAMA_NUM_THREADS=6
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_QUEUE=64
    deploy:
      resources:
        limits:
          cpus: '8.0'  # Limit to 8 CPU cores
          memory: 8G   # Limit to 8GB RAM
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 1000s
      retries: 3
      start_period: 40s
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "ollama serve & 
      pid=$! && 
      sleep 10 && 
      ollama pull tinyllama && 
      ollama pull llama3.2:1b && 
      ollama pull nomic-embed-text &&
      wait $pid"
    profiles:
      - necessary

  # WebUI (depends on Ollama)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - ai_network
    depends_on:
      - ollama

  # Agent services (depend on Qdrant and Ollama)
  agent1_student:
    build:
      context: ./agents/agent1_student
      dockerfile: Dockerfile
    container_name: agent1_student
    restart: unless-stopped
    ports:
      - "8001:8000"
    networks:
      - ai_network
    environment:
      - COLLECTION=agent1_student
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=tinyllama
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=256
      - OLLAMA_TEMPERATURE=0.2
    depends_on:
      - qdrant
      - ollama

  agent2_ticket:
    build:
      context: ./agents/agent2_ticket
      dockerfile: Dockerfile
    container_name: agent2_ticket
    restart: unless-stopped
    ports:
      - "8002:8000"
    networks:
      - ai_network
    environment:
      - COLLECTION=agent2_tickets
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=tinyllama
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=256
      - OLLAMA_TEMPERATURE=0.2
      - RAG_LIMIT=3
      - OLLAMA_MAX_CONTEXT_CHARS=4000
      - OLLAMA_MAX_DOC_CHARS=800
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    profiles:
      - necessary

  agent3_analytics:
    build:
      context: ./agents/agent3_analytics
      dockerfile: Dockerfile
    container_name: agent3_analytics
    restart: unless-stopped
    ports:
      - "8003:8000"
    networks:
      - ai_network
    environment:
      - COLLECTION=agent3_stats
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=tinyllama
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=256
      - OLLAMA_TEMPERATURE=0.2
    depends_on:
      - qdrant
      - ollama

  agent4_bos:
    build:
      context: ./agents/agent4_bos
      dockerfile: Dockerfile
    container_name: agent4_bos
    restart: unless-stopped
    ports:
      - "8004:8000"
    networks:
      - ai_network
    environment:
      - COLLECTION=agent4_bos
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=tinyllama
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=256
      - OLLAMA_TEMPERATURE=0.2
    depends_on:
      - qdrant
      - ollama

  agent5_security:
    build:
      context: ./agents/agent5_security
      dockerfile: Dockerfile
    container_name: agent5_security
    restart: unless-stopped
    ports:
      - "8005:8000"
    networks:
      - ai_network
    environment:
      - COLLECTION=agent5_audit
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=tinyllama
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=256
      - OLLAMA_TEMPERATURE=0.2
    depends_on:
      - qdrant
      - ollama

  # Node-RED (depends on all agents being available)
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    networks:
      - ai_network
    profiles:
      - necessary

volumes:
  qdrant_data:
  ollama_data:
  open_webui_data:
  nodered_data:

networks:
  ai_network:
    driver: bridge
